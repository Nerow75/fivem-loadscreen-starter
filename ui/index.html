<!-- index.html -->
<!-- Fichier principal du projet : point d'entrée de l'application React pour le chargement FiveM -->

<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Métadonnées SEO et accessibilité -->
  <meta name="description" content="Écran de chargement interactif pour serveur FiveM Sun Andreas" />
  <meta name="theme-color" content="#22A7E8" />

  <!-- Titre affiché dans l’onglet du navigateur -->
  <title>Chargement</title>

  <!-- Icône de l’application (favicon) -->
  <link rel="icon" type="image/png" href="logo.png" />

  <!-- Règle d’accessibilité : réduction des animations pour utilisateurs sensibles -->
  <style>
    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 1ms !important;
        transition-duration: 1ms !important;
        animation-iteration-count: 1 !important;
      }
    }
  </style>
</head>

<body>
  <!-- Élément racine pour le montage React -->
  <div id="root" role="application" aria-label="Écran de chargement du serveur"></div>

  <!-- Script d’initialisation de l’application -->
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
