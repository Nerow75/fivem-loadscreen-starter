<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Starter de loading screen configurable pour serveur FiveM"
    />
    <meta name="theme-color" content="#22A7E8" />
    <title>FiveM Loadscreen Starter</title>
    <link rel="icon" type="image/svg+xml" href="logo.svg" />
    <style>
      @media (prefers-reduced-motion: reduce) {
        * {
          animation-duration: 1ms !important;
          transition-duration: 1ms !important;
          animation-iteration-count: 1 !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root" role="application" aria-label="Ecran de chargement du serveur"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
